services:
  minio:
    image: minio/minio
    env_file:
      - .env
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API
      - "9001:9001" # UI
  
  minio-client:
    image: minio/mc
    depends_on:
      - minio
    container_name: minio-client
    entrypoint: >
      sh -c "
        until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY}; do
          echo 'Waiting for MinIO...'
          sleep 5
        done &&
        mc mb local/landing --ignore-existing &&
        mc mb local/warehouse --ignore-existing &&
        mc policy set public local/landing &&
        mc policy set public local/lakehouse-warehouse &&
        tail -f /dev/null
      "
  # The Metadata Database (Postgres)
  # The Hive Metastore needs a place to save the list of folders.
  metastore-db:
    image: postgres:15
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive_password
    container_name: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db -h localhost -p 5432"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 10s

  hive-metastore:
    image: naushadh/hive-metastore:latest
    depends_on:
      metastore-db:
        condition: service_healthy
      minio:
        condition: service_started
    container_name: hive-metastore
    environment:
      # Database Configuration
      DATABASE_HOST: metastore-db
      DATABASE_PORT: 5432
      DATABASE_DB: metastore_db
      DATABASE_USER: hive
      DATABASE_PASSWORD: hive_password
      DATABASE_TYPE: postgres 
      
      # S3 / MinIO Configuration
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: us-east-1
      S3_BUCKET: warehouse
      S3_PREFIX: iceberg
      METASTORE_HADOOP_FS_S3A_PATH_STYLE_ACCESS: "true"
      METASTORE_HADOOP_FS_S3A_IMPL: org.apache.hadoop.fs.s3a.S3AFileSystem
    ports:
      - "9083:9083"
  trino:
    image: trinodb/trino:444
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc/catalog/hive.properties:/etc/trino/catalog/hive.properties
      - ./trino/etc/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties
      - ./trino/etc/config.properties:/etc/trino/config.properties
      - ./trino/etc/jvm.config:/etc/trino/jvm.config